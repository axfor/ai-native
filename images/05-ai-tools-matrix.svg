<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" style="max-width:800px">
  <defs>
    <filter id="shadow3">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="800" height="500" rx="16" fill="#fafbfe"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">AI Coding 工具能力矩阵</text>

  <!-- Axis labels -->
  <text x="400" y="480" text-anchor="middle" font-size="13" fill="#888">自主性程度 →</text>
  <text x="22" y="260" text-anchor="middle" font-size="13" fill="#888" transform="rotate(-90,22,260)">代码理解深度 →</text>

  <!-- Grid -->
  <line x1="60" y1="60" x2="60" y2="450" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="60" y1="450" x2="770" y2="450" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="60" y1="300" x2="770" y2="300" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="5,5"/>
  <line x1="60" y1="175" x2="770" y2="175" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="5,5"/>
  <line x1="300" y1="60" x2="300" y2="450" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="5,5"/>
  <line x1="540" y1="60" x2="540" y2="450" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="5,5"/>

  <!-- Zone labels -->
  <text x="180" y="82" text-anchor="middle" font-size="11" fill="#aaa">行内补全</text>
  <text x="420" y="82" text-anchor="middle" font-size="11" fill="#aaa">交互助手</text>
  <text x="655" y="82" text-anchor="middle" font-size="11" fill="#aaa">自主代理</text>

  <!-- Tabnine -->
  <circle cx="140" cy="370" r="30" fill="#4CAF50" opacity="0.85"/>
  <text x="140" y="374" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Tabnine</text>

  <!-- GitHub Copilot -->
  <circle cx="260" cy="290" r="38" fill="#2196F3" opacity="0.85"/>
  <text x="260" y="286" text-anchor="middle" font-size="11" fill="white" font-weight="bold">GitHub</text>
  <text x="260" y="300" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Copilot</text>

  <!-- Cursor -->
  <circle cx="430" cy="200" r="38" fill="#9C27B0" opacity="0.85"/>
  <text x="430" y="204" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Cursor</text>

  <!-- Windsurf -->
  <circle cx="480" cy="280" r="30" fill="#00BCD4" opacity="0.85"/>
  <text x="480" y="284" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Windsurf</text>

  <!-- Claude Code -->
  <circle cx="650" cy="130" r="42" fill="#D97706" opacity="0.9"/>
  <text x="650" y="126" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Claude</text>
  <text x="650" y="142" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Code</text>

  <!-- Codex -->
  <circle cx="700" cy="220" r="36" fill="#10a37f" opacity="0.85"/>
  <text x="700" y="224" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Codex</text>

  <!-- Devin -->
  <circle cx="730" cy="120" r="32" fill="#e94560" opacity="0.85"/>
  <text x="730" y="124" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Devin</text>

  <!-- Cline -->
  <circle cx="560" cy="210" r="28" fill="#FF9800" opacity="0.85"/>
  <text x="560" y="214" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Cline</text>

  <!-- Aider -->
  <circle cx="600" cy="290" r="28" fill="#795548" opacity="0.85"/>
  <text x="600" y="294" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Aider</text>

  <!-- Legend -->
  <rect x="80" y="90" width="180" height="70" rx="8" fill="white" filter="url(#shadow3)" opacity="0.95"/>
  <text x="95" y="112" font-size="11" fill="#333" font-weight="bold">圆圈大小 = 市场份额</text>
  <circle cx="100" cy="133" r="5" fill="#2196F3" opacity="0.85"/>
  <text x="112" y="137" font-size="10" fill="#666">IDE 集成</text>
  <circle cx="100" cy="150" r="5" fill="#D97706" opacity="0.85"/>
  <text x="112" y="154" font-size="10" fill="#666">终端/CLI 代理</text>
</svg>
