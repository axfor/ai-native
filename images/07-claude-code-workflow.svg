<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" style="max-width:800px">
  <defs>
    <filter id="shadow5">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="380" rx="16" fill="#1a1a2e"/>
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#f0f0f0">Claude Code 工作流程</text>

  <!-- Step 1 -->
  <rect x="30" y="60" width="170" height="130" rx="10" fill="#16213e" stroke="#667eea" stroke-width="1.5"/>
  <circle cx="60" cy="85" r="14" fill="#667eea"/>
  <text x="60" y="89" text-anchor="middle" font-size="11" fill="white" font-weight="bold">1</text>
  <text x="82" y="89" font-size="13" fill="#e0e0e0" font-weight="bold">安装启动</text>
  <text x="45" y="115" font-size="10" fill="#a0a0c0" font-family="monospace">npm i -g @anthropic-ai/</text>
  <text x="45" y="130" font-size="10" fill="#a0a0c0" font-family="monospace">claude-code</text>
  <text x="45" y="155" font-size="10" fill="#a0a0c0" font-family="monospace">cd your-project</text>
  <text x="45" y="170" font-size="10" fill="#a0a0c0" font-family="monospace">claude</text>

  <!-- Arrow -->
  <text x="212" y="125" font-size="20" fill="#667eea">→</text>

  <!-- Step 2 -->
  <rect x="230" y="60" width="170" height="130" rx="10" fill="#16213e" stroke="#764ba2" stroke-width="1.5"/>
  <circle cx="260" cy="85" r="14" fill="#764ba2"/>
  <text x="260" y="89" text-anchor="middle" font-size="11" fill="white" font-weight="bold">2</text>
  <text x="282" y="89" font-size="13" fill="#e0e0e0" font-weight="bold">描述意图</text>
  <text x="245" y="115" font-size="10" fill="#a0a0c0" font-family="monospace">"帮我重构这个</text>
  <text x="245" y="130" font-size="10" fill="#a0a0c0" font-family="monospace"> 用户认证模块，</text>
  <text x="245" y="145" font-size="10" fill="#a0a0c0" font-family="monospace"> 拆分成独立的</text>
  <text x="245" y="160" font-size="10" fill="#a0a0c0" font-family="monospace"> service 和</text>
  <text x="245" y="175" font-size="10" fill="#a0a0c0" font-family="monospace"> controller"</text>

  <!-- Arrow -->
  <text x="412" y="125" font-size="20" fill="#764ba2">→</text>

  <!-- Step 3 -->
  <rect x="430" y="60" width="170" height="130" rx="10" fill="#16213e" stroke="#D97706" stroke-width="1.5"/>
  <circle cx="460" cy="85" r="14" fill="#D97706"/>
  <text x="460" y="89" text-anchor="middle" font-size="11" fill="white" font-weight="bold">3</text>
  <text x="482" y="89" font-size="13" fill="#e0e0e0" font-weight="bold">AI 自主执行</text>
  <text x="445" y="115" font-size="10" fill="#a0a0c0">• 分析代码库结构</text>
  <text x="445" y="133" font-size="10" fill="#a0a0c0">• 制定重构计划</text>
  <text x="445" y="151" font-size="10" fill="#a0a0c0">• 创建/修改多文件</text>
  <text x="445" y="169" font-size="10" fill="#a0a0c0">• 运行测试验证</text>

  <!-- Arrow -->
  <text x="612" y="125" font-size="20" fill="#D97706">→</text>

  <!-- Step 4 -->
  <rect x="630" y="60" width="140" height="130" rx="10" fill="#16213e" stroke="#4CAF50" stroke-width="1.5"/>
  <circle cx="660" cy="85" r="14" fill="#4CAF50"/>
  <text x="660" y="89" text-anchor="middle" font-size="11" fill="white" font-weight="bold">4</text>
  <text x="682" y="89" font-size="13" fill="#e0e0e0" font-weight="bold">审查提交</text>
  <text x="645" y="115" font-size="10" fill="#a0a0c0">• Review diff</text>
  <text x="645" y="133" font-size="10" fill="#a0a0c0">• 验证测试通过</text>
  <text x="645" y="151" font-size="10" fill="#a0a0c0">• git commit</text>
  <text x="645" y="169" font-size="10" fill="#a0a0c0">• 提交 PR</text>

  <!-- Bottom: Key commands -->
  <rect x="30" y="210" width="740" height="155" rx="10" fill="#16213e" stroke="#333" stroke-width="1"/>
  <text x="50" y="238" font-size="14" font-weight="bold" fill="#667eea">常用命令 &amp; 技巧</text>

  <text x="50" y="265" font-size="11" fill="#D97706" font-family="monospace">claude "修复这个 bug"</text>
  <text x="350" y="265" font-size="11" fill="#888">← 直接用自然语言描述任务</text>

  <text x="50" y="290" font-size="11" fill="#D97706" font-family="monospace">claude "给这个函数写单元测试"</text>
  <text x="350" y="290" font-size="11" fill="#888">← AI 分析代码后自动生成测试</text>

  <text x="50" y="315" font-size="11" fill="#D97706" font-family="monospace">/review-pr 123</text>
  <text x="350" y="315" font-size="11" fill="#888">← 审查 GitHub PR</text>

  <text x="50" y="340" font-size="11" fill="#D97706" font-family="monospace">CLAUDE.md</text>
  <text x="350" y="340" font-size="11" fill="#888">← 项目根目录配置文件，定义项目规范和上下文</text>
</svg>
